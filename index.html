<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ECEFF3">
<title>AIに勝てるか? じゃんけん読心バトル</title>
<meta name="description" content="AIがあなたの出す手を予測して先回りする。20戦して勝ち越せたら本物。ログイン不要・完全無料。">
<meta property="og:title" content="AIに勝てるか? じゃんけん読心バトル">
<meta property="og:description" content="AIがあなたの癖を学習して手を読んでくる。20戦で勝ち越せるか?">
<meta property="og:type" content="website">
<meta property="og:url" content="https://8ega4.github.io/ai-kateru-ka/">
<meta property="og:image" content="https://8ega4.github.io/ai-kateru-ka/images/ogp.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ECEFF3;
  --ink:#14171F;
  --card:#FFFFFF;
  --line:#D5DAE2;
  --you:#FF6B1A;
  --you-soft:#FFF0E5;
  --ai:#1F3BE0;
  --ai-soft:#E8EBFD;
  --draw:#5D6570;
  --disp:'DotGothic16',monospace;
  --body:'Zen Kaku Gothic New',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--body);
  background:var(--bg);
  color:var(--ink);
  display:flex;
  justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.app{
  width:100%;
  max-width:440px;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  padding:16px 16px calc(16px + env(safe-area-inset-bottom));
  gap:12px;
}

/* ---- header ---- */
header{display:flex;justify-content:center;align-items:baseline}
h1{font-family:var(--disp);font-size:18px;font-weight:400;letter-spacing:.04em}
h1 .q{color:var(--ai)}

/* ---- round bar ---- */
.roundbar{display:flex;flex-direction:column;gap:7px;margin-top:2px}
.roundinfo{
  display:flex;align-items:baseline;justify-content:center;gap:7px;
  font-family:var(--disp);
}
.roundinfo .rlabel{font-size:13px;color:var(--draw);letter-spacing:.14em}
.roundinfo .rnow{font-size:26px;color:var(--ink);line-height:1}
.roundinfo .rtot{font-size:15px;color:var(--draw)}
.roundinfo .rremain{
  margin-left:8px;padding:2px 10px;border-radius:99px;
  font-size:13px;color:var(--draw);background:var(--card);border:1px solid var(--line);
}
.roundinfo .rremain.warn{color:#E0311F;border-color:#F4B7AE;background:#FDEEEC}
.rprog{display:grid;grid-template-columns:repeat(20,1fr);gap:2px}
.rseg{height:8px;border-radius:2px;background:var(--line);transition:background .3s ease}
.rseg.done{background:var(--ai)}
.rseg.warn{background:#E0311F}
.rseg.cur{box-shadow:0 0 0 2px var(--bg),0 0 0 3.5px currentColor}
.rseg.cur.done{color:var(--ai)}
.rseg.cur.warn{color:#E0311F}

/* ---- scoreboard ---- */
.score{
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:10px 16px;
}
.side{display:flex;flex-direction:column;gap:2px}
.side.you{align-items:flex-end}
.side .tag{font-family:var(--disp);font-size:13px;letter-spacing:.12em}
.side.you .tag{color:var(--you)}
.side.ai .tag{color:var(--ai)}
.side .num{font-family:var(--disp);font-size:34px;line-height:1}
.side.you .num{color:var(--you)}
.side.ai .num{color:var(--ai)}
.draws{font-family:var(--disp);font-size:13px;color:var(--draw);text-align:center;padding:0 12px}
.draws b{display:block;font-size:17px;font-weight:400;color:var(--ink)}

/* ---- streak ---- */
.streak{
  height:18px;margin-top:-6px;
  font-family:var(--disp);font-size:14px;letter-spacing:.06em;
  text-align:center;line-height:18px;
}
.streak.win{color:var(--you)}
.streak.lose{color:var(--ai)}

/* ---- stage ---- */
.stage{
  flex:1;
  background:
    linear-gradient(90deg,rgba(31,59,224,.06),rgba(31,59,224,0) 42%,rgba(255,107,26,0) 58%,rgba(255,107,26,.06)),
    var(--card);
  border:1px solid var(--line);border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:18px 14px;position:relative;overflow:hidden;min-height:230px;
}
.hands{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%}
.handcol{display:flex;flex-direction:column;align-items:center;gap:3px}
.handlabel{font-family:var(--disp);font-size:12px;letter-spacing:.12em}
.handcol.you .handlabel{color:var(--you)}
.handcol.ai .handlabel{color:var(--ai)}
/* ---- 陣営アバター(AI=ロボット/YOU=人型) ---- */
.avatar{width:34px;height:32px;position:relative;flex:0 0 auto}
.avatar-ai .bot-head{
  position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:28px;height:22px;
  background:var(--ai-soft);border:2px solid var(--ai);
  clip-path:polygon(14% 0,86% 0,100% 22%,100% 100%,0 100%,0 22%);
}
.avatar-ai .bot-visor{
  position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
  width:16px;height:5px;border-radius:2px;background:var(--ai);
}
.avatar-ai .bot-antenna{
  position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:2px;height:9px;background:var(--ai);
}
.avatar-ai .bot-antenna::after{
  content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--ai);
  box-shadow:0 0 4px rgba(31,59,224,.5);
}
.avatar-you .hu-head{
  position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:16px;height:16px;border-radius:50%;
  background:var(--you-soft);border:2px solid var(--you);
}
.avatar-you .hu-shoulders{
  position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:32px;height:18px;
  background:var(--you-soft);border:2px solid var(--you);border-bottom:none;
  border-radius:16px 16px 0 0;
}

.hand{font-size:64px;text-align:center;line-height:1.2;filter:grayscale(0);transition:transform .18s ease}
.handcol.you .hand{transform:scaleX(-1)}
.hand.pop{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(.4)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.handcol.you .hand.pop{animation:popflip .3s ease}
@keyframes popflip{0%{transform:scaleX(-1) scale(.4)}70%{transform:scaleX(-1) scale(1.15)}100%{transform:scaleX(-1) scale(1)}}
.vs{font-family:var(--disp);font-size:15px;color:var(--draw);padding:0 6px}
.verdict{
  font-family:var(--disp);font-size:30px;letter-spacing:.08em;height:38px;
  display:flex;align-items:center;
}
.verdict.win{color:var(--you)}
.verdict.lose{color:var(--ai)}
.verdict.draw{color:var(--draw)}
.callout{
  font-size:15px;color:var(--draw);min-height:42px;text-align:center;line-height:1.5;
  padding:0 8px;
}
.callout .read{color:var(--ai);font-weight:700}

/* ---- 単眼アバター ---- */
.ai-eye{width:76px;height:46px;position:relative;flex:0 0 auto}
.eye-shell{
  position:absolute;inset:0;background:#fff;
  border:2px solid var(--ink);border-radius:50%;
  overflow:hidden;transition:box-shadow .2s ease;
}
.iris{
  position:absolute;left:50%;top:50%;width:26px;height:26px;margin:-13px 0 0 -13px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#6E81F0,var(--ai) 70%);
  transition:transform .25s ease,background .3s ease;
}
.pupil{
  position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;
  border-radius:50%;background:var(--ink);
  transition:transform .2s ease;
}
.glint{
  position:absolute;left:4px;top:4px;width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.9);
}
.eye-lid{
  position:absolute;inset:-2px;background:var(--card);
  border-bottom:2px solid var(--ink);
  transform:translateY(-100%);transition:transform .1s ease;
}
.ai-eye.serious .eye-lid{transform:translateY(-62%)}
.ai-eye.blink .eye-lid{transform:translateY(0)}
.ai-eye.serious .iris{background:radial-gradient(circle at 35% 35%,#FF9142,#E0311F 70%)}
.ai-eye.hit .pupil{transform:scale(.5)}
.ai-eye.hit .eye-shell{box-shadow:0 0 0 3px var(--ai-soft),0 0 14px rgba(31,59,224,.55)}
.ai-eye.serious.hit .eye-shell{box-shadow:0 0 0 3px #FDE8E5,0 0 14px rgba(224,49,31,.55)}

/* ---- 照準(ロックオン) ---- */
.reticle{
  position:absolute;left:0;top:0;width:96px;height:96px;margin:-48px 0 0 -48px;
  pointer-events:none;opacity:0;z-index:2;color:var(--ai);
}
.reticle.serious{color:#E0311F}
.reticle svg{width:100%;height:100%;display:block}
.reticle .lock-label{
  position:absolute;left:50%;bottom:-15px;transform:translateX(-50%);
  font-family:var(--disp);font-size:9px;letter-spacing:.18em;white-space:nowrap;
}
.reticle.show{animation:lockon .95s ease forwards}
@keyframes lockon{
  0%{opacity:0;transform:scale(2.2) rotate(-90deg)}
  35%{opacity:1;transform:scale(1) rotate(0deg)}
  78%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(1.08)}
}

/* ---- 読心メーター(シグネチャー) ---- */
.meter-wrap{width:100%;max-width:300px;display:flex;flex-direction:column;gap:5px}
.meter-label{
  display:flex;justify-content:space-between;
  font-family:var(--disp);font-size:11px;color:var(--draw);letter-spacing:.08em;
}
.meter-label .pct{color:var(--ai)}
.meter{
  height:10px;border-radius:99px;background:var(--ai-soft);
  border:1px solid var(--line);overflow:hidden;
}
.meter-fill{
  height:100%;width:0%;border-radius:99px;
  background:linear-gradient(90deg,#6E81F0,var(--ai));
  transition:width .5s ease,background .3s ease;
}
.meter-fill.serious{background:linear-gradient(90deg,#FF9142,#E0311F);}

/* ---- controls ---- */
.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hbtn{
  font-family:var(--body);
  background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:14px 0 10px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:transform .1s ease,border-color .15s,background .15s;
  touch-action:manipulation;
}
.hbtn .e{font-size:38px;line-height:1.1}
.hbtn .n{font-size:14px;font-weight:700;color:var(--draw)}
.hbtn:active{transform:scale(.94);border-color:var(--you);background:var(--you-soft)}
.hbtn:focus-visible{outline:3px solid var(--you);outline-offset:2px}
.hbtn:disabled{opacity:.45;pointer-events:none}

/* ---- result overlay ---- */
.overlay{
  position:fixed;inset:0;background:rgba(20,23,31,.55);
  display:none;align-items:center;justify-content:center;padding:20px;z-index:10;
}
.overlay.show{display:flex}
.result{
  width:100%;max-width:380px;background:var(--card);border-radius:20px;
  padding:26px 22px;display:flex;flex-direction:column;gap:14px;text-align:center;
  animation:rise .35s ease;
}
@keyframes rise{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.result .headline{font-family:var(--disp);font-size:25px;line-height:1.4}
.result .headline.win{color:var(--you)}
.result .headline.lose{color:var(--ai)}
.result .title-badge{
  align-self:center;font-family:var(--disp);font-size:15.5px;
  border:1.5px solid var(--ink);border-radius:99px;padding:6px 18px;
}
.result .stats{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  font-size:14px;color:var(--draw);
}
.result .stats div{background:var(--bg);border-radius:10px;padding:10px 6px}
.result .stats b{display:block;font-family:var(--disp);font-size:22px;font-weight:400;color:var(--ink);margin-top:2px}
.result .stats .readpct b{color:var(--ai)}
.result .stats .streakstat{grid-column:1/-1}
.result .stats .streakstat b{color:var(--you)}
.result .comment{font-size:14.5px;line-height:1.7}
.result .best{font-family:var(--disp);font-size:14px;color:var(--you)}
.result .best-line{font-size:12.5px;color:var(--draw)}
.btn{
  font-family:var(--body);font-weight:700;font-size:15px;
  border-radius:14px;padding:14px;cursor:pointer;border:none;
  touch-action:manipulation;
}
.btn:focus-visible{outline:3px solid var(--you);outline-offset:2px}
.btn.share{background:var(--ink);color:#fff}
.btn.retry{background:var(--bg);color:var(--ink);border:1.5px solid var(--line)}
.btn:active{transform:scale(.97)}

footer{font-size:12px;color:var(--draw);text-align:center;line-height:1.6}

/* ---- 決着演出 ---- */
.fx{position:fixed;inset:0;pointer-events:none;z-index:9;overflow:hidden}
.confetti{
  position:absolute;top:-18px;width:9px;height:14px;border-radius:2px;
  animation:confetti-fall 1.3s linear forwards;
}
@keyframes confetti-fall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(103vh) rotate(400deg);opacity:.85}
}
.scanline{
  position:absolute;left:0;right:0;height:38%;top:-38%;
  background:linear-gradient(180deg,rgba(31,59,224,0),rgba(31,59,224,.26) 60%,rgba(31,59,224,.5));
  border-bottom:2.5px solid var(--ai);
  animation:scan .8s ease-in forwards;
}
@keyframes scan{0%{top:-38%}100%{top:100%}}
.fx-analyze{
  position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
  font-family:var(--disp);font-size:22px;letter-spacing:.22em;color:var(--ai);
  opacity:0;animation:analyze .8s ease forwards;
}
@keyframes analyze{0%,40%{opacity:0}55%,85%{opacity:1}100%{opacity:0}}
.clash{
  position:absolute;inset:0;
  background:linear-gradient(90deg,var(--you),transparent 44%,transparent 56%,var(--ai));
  opacity:0;animation:clash .5s ease forwards;
}
@keyframes clash{0%{opacity:0;transform:scaleX(1.7)}45%{opacity:.5}100%{opacity:0;transform:scaleX(1)}}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>AIに勝てるか<span class="q">?</span></h1>
  </header>

  <div class="score" aria-label="スコア">
    <div class="side ai"><span class="tag">AI</span><span class="num" id="sAi">0</span></div>
    <div class="draws">DRAW<b id="sDraw">0</b></div>
    <div class="side you"><span class="tag">YOU</span><span class="num" id="sYou">0</span></div>
  </div>

  <div class="roundbar">
    <div class="roundinfo">
      <span class="rlabel">ROUND</span>
      <span class="rnow" id="round">1</span>
      <span class="rtot">/ 20</span>
      <span class="rremain" id="rRemain">あと20戦</span>
    </div>
    <div class="rprog" id="rProg" aria-hidden="true"></div>
  </div>
  <div class="streak" id="streak" role="status"></div>

  <div class="stage">
    <div class="ai-eye" id="aiEye" aria-hidden="true">
      <div class="eye-shell">
        <div class="iris" id="iris"><div class="pupil"></div><div class="glint"></div></div>
        <div class="eye-lid"></div>
      </div>
    </div>
    <div class="hands">
      <div class="handcol ai">
        <div class="avatar avatar-ai" aria-hidden="true">
          <div class="bot-head"></div><div class="bot-visor"></div><div class="bot-antenna"></div>
        </div>
        <div class="hand" id="hAi" aria-label="AIの手">❔</div>
        <div class="handlabel">AI</div>
      </div>
      <div class="vs">VS</div>
      <div class="handcol you">
        <div class="avatar avatar-you" aria-hidden="true">
          <div class="hu-head"></div><div class="hu-shoulders"></div>
        </div>
        <div class="hand" id="hYou" aria-label="あなたの手">❔</div>
        <div class="handlabel">YOU</div>
      </div>
    </div>
    <div class="verdict" id="verdict" role="status"></div>
    <div class="callout" id="callout">好きな手を出してください。AIはあなたの<b>癖</b>を学習し始めます。</div>
    <div class="meter-wrap">
      <div class="meter-label"><span id="meterLabel">AIの読心レベル</span><span class="pct" id="confPct">0%</span></div>
      <div class="meter" aria-hidden="true"><div class="meter-fill" id="confBar"></div></div>
    </div>
    <div class="reticle" id="reticle" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="2" stroke-dasharray="10 6"/>
        <circle cx="50" cy="50" r="26" stroke="currentColor" stroke-width="1.5"/>
        <line x1="50" y1="2" x2="50" y2="18" stroke="currentColor" stroke-width="2"/>
        <line x1="50" y1="82" x2="50" y2="98" stroke="currentColor" stroke-width="2"/>
        <line x1="2" y1="50" x2="18" y2="50" stroke="currentColor" stroke-width="2"/>
        <line x1="82" y1="50" x2="98" y2="50" stroke="currentColor" stroke-width="2"/>
        <circle cx="50" cy="50" r="3" fill="currentColor"/>
      </svg>
      <span class="lock-label">LOCK ON</span>
    </div>
  </div>

  <div class="controls">
    <button class="hbtn" data-hand="g"><span class="e">✊</span><span class="n">グー</span></button>
    <button class="hbtn" data-hand="c"><span class="e">✌️</span><span class="n">チョキ</span></button>
    <button class="hbtn" data-hand="p"><span class="e">🖐</span><span class="n">パー</span></button>
  </div>

  <footer>AIは通信せずこの画面の中だけで学習します。ログイン不要。</footer>
</div>

<div class="fx" id="fx" aria-hidden="true"></div>

<div class="overlay" id="overlay">
  <div class="result" role="dialog" aria-label="結果">
    <div class="headline" id="rHead"></div>
    <div class="title-badge" id="rTitle"></div>
    <div class="stats">
      <div>戦績<b id="rScore"></b></div>
      <div class="readpct">読まれ度<b id="rRead"></b></div>
      <div class="streakstat">最大連勝<b id="rMaxStreak"></b></div>
    </div>
    <div class="comment" id="rComment"></div>
    <div class="best" id="rBestNew" hidden>🎉 自己ベスト更新!</div>
    <div class="best-line" id="rBest"></div>
    <button class="btn share" id="btnShare">結果をXでシェア</button>
    <button class="btn retry" id="btnRetry">もう一回挑む</button>
  </div>
</div>

<script>
(function(){
'use strict';
var HANDS=['g','c','p'];
var COUNTER={g:'p',c:'g',p:'c'};
var BEATS={g:'c',c:'p',p:'g'};
var EMOJI={g:'✊',c:'✌️',p:'🖐'};
var NAME={g:'グー',c:'チョキ',p:'パー'};
var TOTAL=20;
var BEST_KEY='aikateru_best';

function loadBest(){
  try{
    var raw=localStorage.getItem(BEST_KEY);
    if(!raw)return{bestWins:0,bestReadPct:null,plays:0};
    var d=JSON.parse(raw);
    return{bestWins:d.bestWins||0,bestReadPct:(typeof d.bestReadPct==='number'?d.bestReadPct:null),plays:d.plays||0};
  }catch(e){return{bestWins:0,bestReadPct:null,plays:0};}
}
function saveBest(d){
  try{localStorage.setItem(BEST_KEY,JSON.stringify(d));}catch(e){}
}

function makeBrain(){
  return {hist:[],res:[],preds:{
    freq:{score:0,last:null},
    markov1:{score:0,last:null},
    markov2:{score:0,last:null},
    wsls:{score:0,last:null}
  }};
}
function argmax(c){return HANDS.reduce(function(a,x){return c[x]>c[a]?x:a;},'g');}
function predictAll(b){
  var h=b.hist,n=h.length,out={},c,i,seen;
  if(n>=1){c={g:0,c:0,p:0};for(i=0;i<n;i++)c[h[i]]++;out.freq=argmax(c);}else out.freq=null;
  if(n>=2){c={g:0,c:0,p:0};seen=false;for(i=0;i<n-1;i++)if(h[i]===h[n-1]){c[h[i+1]]++;seen=true;}out.markov1=seen?argmax(c):null;}else out.markov1=null;
  if(n>=3){c={g:0,c:0,p:0};seen=false;for(i=0;i<n-2;i++)if(h[i]===h[n-2]&&h[i+1]===h[n-1]){c[h[i+2]]++;seen=true;}out.markov2=seen?argmax(c):null;}else out.markov2=null;
  if(n>=1&&b.res.length>=1){
    var lastH=h[n-1],lastR=b.res[b.res.length-1];
    out.wsls=(lastR==='w'||lastR==='d')?lastH:COUNTER[lastH];
  }else out.wsls=null;
  return out;
}
function aiMove(b){
  var preds=predictAll(b),bestKey=null,bestScore=-1,k;
  for(k in b.preds){
    b.preds[k].last=preds[k];
    if(preds[k]!==null&&b.preds[k].score>bestScore){bestScore=b.preds[k].score;bestKey=k;}
  }
  var conf=Math.max(0,Math.min(1,bestScore));
  if(bestKey===null||bestScore<=0.15){
    return {move:HANDS[Math.floor(Math.random()*3)],conf:conf,predicted:null};
  }
  return {move:COUNTER[preds[bestKey]],conf:conf,predicted:preds[bestKey]};
}
function learn(b,humanMove,aiPlayed){
  var k,p;
  for(k in b.preds){
    p=b.preds[k];
    if(p.last!==null)p.score=p.score*0.8+(p.last===humanMove?0.2:0);
    else p.score*=0.9;
  }
  var r=humanMove===aiPlayed?'d':(BEATS[humanMove]===aiPlayed?'w':'l');
  b.hist.push(humanMove);b.res.push(r);
  return r;
}

// ---- game state ----
var brain,round,you,ai,draw,predHit,predTotal,pending,busy;
var streakType,streakLen,maxWinStreak;
var $=function(id){return document.getElementById(id);};
var prefersReduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ---- 決着演出 ----
function clearFx(){var fx=$('fx');fx.innerHTML='';}
function runFinishFx(kind,done){
  if(prefersReduced){done();return;}
  var fx=$('fx'),i;
  clearFx();
  if(kind==='win'){
    for(i=0;i<22;i++){
      var p=document.createElement('div');
      p.className='confetti';
      p.style.left=(Math.random()*100)+'%';
      p.style.background=(i%2)?'var(--you)':'#FFB07A';
      p.style.animationDelay=(Math.random()*0.35)+'s';
      p.style.animationDuration=(1+Math.random()*0.6)+'s';
      fx.appendChild(p);
    }
    setTimeout(done,600);
    setTimeout(clearFx,1600);
  }else if(kind==='lose'){
    var sl=document.createElement('div');sl.className='scanline';
    var tx=document.createElement('div');tx.className='fx-analyze';tx.textContent='解析完了';
    fx.appendChild(sl);fx.appendChild(tx);
    setTimeout(done,850);
    setTimeout(clearFx,1000);
  }else{
    var fl=document.createElement('div');fl.className='clash';
    fx.appendChild(fl);
    setTimeout(done,550);
    setTimeout(clearFx,700);
  }
}
var btns=document.querySelectorAll('.hbtn');

// ---- 単眼アバター & 照準 ----
var eye=$('aiEye'),iris=$('iris'),reticle=$('reticle');
var stage=document.querySelector('.stage');
var IRIS_MAX_X=17,IRIS_MAX_Y=7;
function lookAt(dx,dy){
  iris.style.transform='translate('+Math.round(dx*IRIS_MAX_X)+'px,'+Math.round(dy*IRIS_MAX_Y)+'px)';
}
function blink(){
  eye.classList.add('blink');
  setTimeout(function(){eye.classList.remove('blink');},140);
}
setInterval(function(){
  if(busy)return;
  lookAt((Math.random()*2-1)*.6,(Math.random()*2-1)*.5);
},2200);
setInterval(function(){if(Math.random()<.7)blink();},3400);
var LOOK={g:-1,c:0,p:1};
btns.forEach(function(b){
  var look=function(){if(!b.disabled)lookAt(LOOK[b.dataset.hand]*.9,.85);};
  b.addEventListener('pointerenter',look);
  b.addEventListener('pointerdown',look);
});
function renderRound(){
  $('round').textContent=round;
  var remain=TOTAL-round+1;
  var rem=$('rRemain');
  rem.textContent='あと'+remain+'戦';
  rem.classList.toggle('warn',remain<=5);
  var prog=$('rProg');
  if(prog.children.length!==TOTAL){
    prog.innerHTML='';
    for(var j=0;j<TOTAL;j++)prog.appendChild(document.createElement('div'));
  }
  var segs=prog.children;
  for(var i=0;i<TOTAL;i++){
    var cls='rseg';
    if(i<round){
      cls+=(i>=TOTAL-5)?' warn':' done';
      if(i===round-1)cls+=' cur';
    }
    segs[i].className=cls;
  }
}
function updateStreak(){
  var el=$('streak');
  if(streakLen>=2&&streakType==='w'){el.textContent='🔥 '+streakLen+'連勝中!';el.className='streak win';}
  else if(streakLen>=2&&streakType==='l'){el.textContent='🌀 '+streakLen+'連敗中…';el.className='streak lose';}
  else{el.textContent='';el.className='streak';}
}
function lockOn(el){
  var r=el.getBoundingClientRect(),s=stage.getBoundingClientRect();
  reticle.style.left=(r.left+r.width/2-s.left)+'px';
  reticle.style.top=(r.top+r.height/2-s.top)+'px';
  reticle.classList.remove('show');
  void reticle.offsetWidth;
  reticle.classList.add('show');
}

function reset(){
  brain=makeBrain();round=1;you=0;ai=0;draw=0;predHit=0;predTotal=0;busy=false;
  streakType=null;streakLen=0;maxWinStreak=0;updateStreak();
  pending=aiMove(brain);
  renderRound();
  $('sYou').textContent=0;$('sAi').textContent=0;$('sDraw').textContent=0;
  $('hYou').textContent='❔';$('hAi').textContent='❔';
  $('verdict').textContent='';$('verdict').className='verdict';
  $('callout').innerHTML='好きな手を出してください。AIはあなたの<b>癖</b>を学習し始めます。';
  $('confBar').style.width='0%';$('confPct').textContent='0%';
  $('confBar').classList.remove('serious');$('meterLabel').textContent='AIの読心レベル';
  eye.classList.remove('serious');eye.classList.remove('hit');
  reticle.classList.remove('serious');reticle.classList.remove('show');
  lookAt(0,0);
  clearFx();
  $('overlay').classList.remove('show');
  btns.forEach(function(b){b.disabled=false;});
}

function play(h){
  if(busy)return;busy=true;
  btns.forEach(function(b){b.disabled=true;});
  var mv=pending;
  var wasPredicted=(mv.predicted===h);
  if(mv.predicted!==null){predTotal++;if(wasPredicted)predHit++;}
  var r=learn(brain,h,mv.move);

  var hy=$('hYou'),ha=$('hAi');
  hy.textContent=EMOJI[h];ha.textContent=EMOJI[mv.move];
  hy.classList.remove('pop');ha.classList.remove('pop');
  void hy.offsetWidth;
  hy.classList.add('pop');ha.classList.add('pop');

  var v=$('verdict');
  if(r==='w'){you++;v.textContent='WIN!';v.className='verdict win';}
  else if(r==='l'){ai++;v.textContent='LOSE…';v.className='verdict lose';}
  else{draw++;v.textContent='DRAW';v.className='verdict draw';}
  $('sYou').textContent=you;$('sAi').textContent=ai;$('sDraw').textContent=draw;

  // ストリーク更新(あいこは途切れさせずカウントもしない)
  if(r!=='d'){
    if(streakType===r)streakLen++;
    else{streakType=r;streakLen=1;}
    if(r==='w'&&streakLen>maxWinStreak)maxWinStreak=streakLen;
  }
  updateStreak();

  if(mv.predicted!==null&&wasPredicted){
    lockOn(hy);
    lookAt(1,.25);
    eye.classList.add('hit');
    setTimeout(function(){eye.classList.remove('hit');},700);
  }else if(mv.predicted!==null){
    lookAt(-.7,-.5);
    blink();setTimeout(blink,240);
  }else{
    lookAt(1,.25);
  }

  var co=$('callout');
  if(mv.predicted!==null&&wasPredicted&&r==='l'){
    co.innerHTML='<span class="read">AI「'+NAME[h]+'を出すと読んでいました」</span>';
  }else if(mv.predicted!==null&&wasPredicted){
    co.innerHTML='<span class="read">AIはあなたの'+NAME[h]+'を予測していました。</span>(あいこで逃げ切り)';
  }else if(mv.predicted!==null){
    co.textContent='AIの予測は'+NAME[mv.predicted]+'。読みが外れました。';
  }else{
    co.textContent='AI「まだデータが足りない…」';
  }
  if(r==='l'&&streakLen===3){
    co.innerHTML+='<br><span class="read">AI「パターンが見えてきました」</span>';
  }

  // 読心レベル = 予測的中率(直近の自信も加味)
  var readPct=predTotal>0?Math.round(predHit/predTotal*100):0;
  var confBar=$('confBar');
  confBar.style.width=readPct+'%';
  $('confPct').textContent=readPct+'%';
  var meterLabel=$('meterLabel');
  if(round>=15){
    confBar.classList.add('serious');
    meterLabel.textContent='AIの読心レベル(本気)';
    eye.classList.add('serious');
    reticle.classList.add('serious');
  }else{
    confBar.classList.remove('serious');
    meterLabel.textContent='AIの読心レベル';
  }

  if(round>=TOTAL){setTimeout(finish,900);return;}
  round++;
  setTimeout(function(){
    renderRound();
    pending=aiMove(brain);
    btns.forEach(function(b){b.disabled=false;});
    busy=false;
    if(round===18)$('callout').innerHTML='<span class="read">AI「勝負どころです」</span>';
    else if(round===20)$('callout').innerHTML='<span class="read">AI「最後の一手、見せてもらいます」</span>';
  },650);
}

function titleFor(readPct){
  if(you>ai){
    if(readPct<=30)return['🏆 あなたの勝ち!','称号: 予測不能人間','AIの読みをほぼ完全に振り切りました。あなたの手は乱数より読みにくい。本当に人間ですか?'];
    return['🏆 あなたの勝ち!','称号: AIキラー','読まれながらも勝ち切るという離れ業。勝負勘の勝利です。'];
  }
  if(you===ai){
    return['🤝 引き分け','称号: 互角の人類代表','AIと互角。ここから先は、あなたの癖との戦いです。'];
  }
  if(readPct>=70)return['🧠 AIの勝ち','称号: 完全に読まれし者','あなたの手の内は'+readPct+'%お見通しでした。人間の「ランダム」は、ランダムではないのです。'];
  if(readPct>=45)return['🧠 AIの勝ち','称号: 癖が出てますよ','中盤からパターンを掴まれました。「負けたら手を変える」…それ、読まれてます。'];
  return['🧠 AIの勝ち','称号: 惜しい人類','読み合いはほぼ互角。運が向けば次は勝てるかもしれません。'];
}

function shareTextFor(readPct,titleName){
  var score=you+'勝'+ai+'敗';
  if(you>ai){
    return 'AIのじゃんけん読心に勝った('+score+')。称号「'+titleName.replace('称号: ','')+'」。\nお前も勝てるならやってみろ→\n#AIに勝てるか';
  }
  if(you===ai){
    return 'AIと互角だった('+score+')。決着つけられる人いる?→\n#AIに勝てるか';
  }
  if(readPct>=70){
    return 'AIに手の内を'+readPct+'%読まれて負けた…。\n人間の代表、誰か仇を取ってくれ→\n#AIに勝てるか';
  }
  return 'AIじゃんけんに'+score+'で負けた。惜しかった。\nリベンジ前にお前も試してみて→\n#AIに勝てるか';
}

function finish(){
  var readPct=predTotal>0?Math.round(predHit/predTotal*100):0;
  var t=titleFor(readPct);
  var head=$('rHead');
  head.textContent=t[0];
  head.className='headline '+(you>ai?'win':you<ai?'lose':'');
  $('rTitle').textContent=t[1];
  $('rScore').textContent=you+'勝'+ai+'敗'+draw+'分';
  $('rRead').textContent=readPct+'%';
  $('rMaxStreak').textContent=maxWinStreak;
  $('rComment').textContent=t[2];

  var best=loadBest();
  var isNewBest=false;
  if(you>best.bestWins){best.bestWins=you;isNewBest=true;}
  if(best.bestReadPct===null||readPct<best.bestReadPct){best.bestReadPct=readPct;isNewBest=true;}
  best.plays=best.plays+1;
  saveBest(best);

  $('rBestNew').hidden=!isNewBest;
  $('rBest').textContent='自己ベスト: '+best.bestWins+'勝 / 読まれ度'+best.bestReadPct+'%';

  var kind=you>ai?'win':you<ai?'lose':'draw';
  runFinishFx(kind,function(){$('overlay').classList.add('show');});

  $('btnShare').onclick=function(){
    var text=shareTextFor(readPct,t[1]);
    var url=new URL(location.origin+location.pathname);
    url.searchParams.set('utm_source','x');
    url.searchParams.set('utm_medium','share');
    url.searchParams.set('utm_content','play'+best.plays);
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url.toString()),'_blank');
  };
}

btns.forEach(function(b){
  b.addEventListener('click',function(){play(b.dataset.hand);});
});
$('btnRetry').addEventListener('click',reset);

reset();
})();
</script>
